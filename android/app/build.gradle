apply plugin: 'com.android.application'

// Release signing: android/keystore.properties (gitignored).
// Local dev points storeFile at ~/keystores/; CI writes it from GitHub Secrets.
// When absent, release builds fall back to the debug keystore so forks still build.
def keystorePropsFile = rootProject.file('keystore.properties')
def keystoreProps = new Properties()
if (keystorePropsFile.exists()) {
    keystorePropsFile.withInputStream { keystoreProps.load(it) }
}

android {
    namespace "com.h5.brickout"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        // SEO-keyworded, store-unique application id (namespace/Java package
        // stays com.h5.brickout - the two are independent)
        applicationId "com.brickverse.bricksbreaker.balls"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 2
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (keystorePropsFile.exists()) {
                storeFile file(keystoreProps['storeFile'])
                storePassword keystoreProps['storePassword']
                keyAlias keystoreProps['keyAlias']
                keyPassword keystoreProps['keyPassword']
            }
        }
    }
    flavorDimensions = ["env"]
    productFlavors {
        dev {
            dimension "env"
            applicationIdSuffix ".dev"
            resValue "string", "app_name", "Brick Out Dev"
            resValue "string", "title_activity_main", "Brick Out Dev"
            resValue "string", "package_name", "com.brickverse.bricksbreaker.balls.dev"
            resValue "string", "custom_url_scheme", "com.brickverse.bricksbreaker.balls.dev"
            // dev builds always use the debug key, even for release buildType
            signingConfig signingConfigs.debug
        }
        prod {
            dimension "env"
            resValue "string", "app_name", "Brick Out"
            resValue "string", "title_activity_main", "Brick Out"
            resValue "string", "package_name", "com.brickverse.bricksbreaker.balls"
            resValue "string", "custom_url_scheme", "com.brickverse.bricksbreaker.balls"
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig keystorePropsFile.exists() ? signingConfigs.release : signingConfigs.debug
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

// Firebase (prod flavor only): google-services.json lives in src/prod/, where
// the google-services plugin's per-variant lookup finds it. Dev builds have no
// json and must not run the plugins, so tasks for dev variants are disabled.
if (file('src/prod/google-services.json').exists()) {
    apply plugin: 'com.google.gms.google-services'
    apply plugin: 'com.google.firebase.crashlytics'
    android.applicationVariants.configureEach { variant ->
        if (variant.flavorName == 'dev') {
            tasks.matching {
                it.name.contains("GoogleServices") && it.name.contains('Dev')
            }.configureEach { enabled = false }
        }
    }
}
